<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Barber</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <a href="index.html" style="text-decoration: none;">
    <div class="header">
        <img src="Logo.png" alt="">
        <p>Process Barber</p>
    </div>
    </a>

    <div class="middle">
        <p>Ariel:</p>
        <img src="MyCut.jpeg" alt="">
    
    <div class="schedule">
        <p>Agenda tu cita ahora!</p>
        <div style="display: flex; width: 100%; flex-direction: row; align-items: center; gap: 10px;" >
            <label for="">Fecha</label>
            <input type="date" id="date">
        </div>
    </div>
    </div>

    <div class="bottom">
        <div class="selectTime">
            <h2>Escoje la hora</h2>
            <button class="time" id="data-time">3 PM</button>
            <button class="time" id="data-time">4 PM</button>
            <button class="time" id="data-time">5 PM</button>
            <button class="time" id="data-time">6 PM</button>
            <button class="time" id="data-time">7 PM</button>
        </div>
        <input type="text" class="contactInput" id="user-name" placeholder="Cual es tu nombre?">
        <button class="sendButton">Enviar</button>
    </div>

    <div style=" display: none; color: #ffd900; text-align: center; margin-top: 20px;" id="successMessage" >
        <h2>¡Listo! Nos vemos pronto.</h2>
    </div>
    <script src="logic.js"></script>
